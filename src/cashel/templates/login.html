<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="csrf-token" content="{{ csrf_token() }}" />
  <title>Cashel — Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <style>
    .login-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }
    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    .login-logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }
    .login-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }
    .login-field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.25rem;
    }
    .login-field label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .login-field input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: monospace;
      box-sizing: border-box;
    }
    .login-field input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .login-btn {
      width: 100%;
      padding: 0.7rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .login-btn:hover { opacity: 0.88; }
    .login-error {
      background: var(--finding-high-bg);
      border: 1px solid var(--high);
      color: var(--high);
      border-radius: 6px;
      padding: 0.6rem 0.85rem;
      font-size: 0.88rem;
      margin-bottom: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">&#128274; Cashel</div>
      <div class="login-sub">Firewall Configuration Auditor</div>

      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('login_post', next=request.args.get('next', '')) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="login-field">
          <label for="api_key">API Key</label>
          <input type="password" id="api_key" name="api_key"
                 placeholder="csh_…" autocomplete="current-password"
                 autofocus required />
        </div>
        <button type="submit" class="login-btn">Sign In</button>
      </form>
    </div>
  </div>
</body>
</html>
