name: cashel

services:
  app:
    container_name: cashel
    build: .
    ports:
      - "8080:5000"
    volumes:
      - cashel_data:/data
    environment:
      - CASHEL_SECRET=${CASHEL_SECRET:?Set CASHEL_SECRET to a strong random string}
      - CASHEL_KEY_FILE=/data/cashel.key
    restart: unless-stopped

volumes:
  cashel_data:
    driver: local
